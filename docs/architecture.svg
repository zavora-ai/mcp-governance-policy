  <rect x="55" y="205" width="695" height="65" rx="6" fill="url(#bg)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">Risk Domains</text>
  <text x="110" y="248" text-anchor="middle" fill="#fca5a5" font-size="8">Financial</text>
  <text x="200" y="248" text-anchor="middle" fill="#fca5a5" font-size="8">Identity</text>
  <text x="290" y="248" text-anchor="middle" fill="#fca5a5" font-size="8">Prod Deploy</text>
  <text x="390" y="248" text-anchor="middle" fill="#86efac" font-size="8">Tool Write</text>
  <text x="480" y="248" text-anchor="middle" fill="#86efac" font-size="8">External Write</text>
  <text x="575" y="248" text-anchor="middle" fill="#fca5a5" font-size="8">Credential</text>
  <text x="665" y="248" text-anchor="middle" fill="#fca5a5" font-size="8">Data Export</text>

  <!-- Decision labels -->
  <rect x="90" y="256" width="50" height="10" rx="2" fill="#dc2626" opacity="0.3"/>
  <rect x="180" y="256" width="50" height="10" rx="2" fill="#dc2626" opacity="0.3"/>
  <rect x="270" y="256" width="50" height="10" rx="2" fill="#dc2626" opacity="0.3"/>
  <rect x="370" y="256" width="50" height="10" rx="2" fill="#22c55e" opacity="0.3"/>
  <rect x="460" y="256" width="50" height="10" rx="2" fill="#22c55e" opacity="0.3"/>
  <rect x="555" y="256" width="50" height="10" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="645" y="256" width="50" height="10" rx="2" fill="#dc2626" opacity="0.3"/>

