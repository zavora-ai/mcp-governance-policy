  <text x="137" y="166" text-anchor="middle" fill="#fef2f2" font-size="9" font-weight="600">evaluate_policy</text>
  <text x="137" y="181" text-anchor="middle" fill="#fca5a5" font-size="8">allow · block · review · pause</text>

  <rect x="228" y="148" width="140" height="42" rx="5" fill="url(#tg)"/>
  <text x="298" y="166" text-anchor="middle" fill="#fef2f2" font-size="9" font-weight="600">request_approval</text>
  <text x="298" y="181" text-anchor="middle" fill="#fca5a5" font-size="8">HITL approval tasks</text>

  <rect x="376" y="148" width="140" height="42" rx="5" fill="url(#tg)"/>
  <text x="446" y="166" text-anchor="middle" fill="#fef2f2" font-size="9" font-weight="600">resolve_approval</text>
  <text x="446" y="181" text-anchor="middle" fill="#fca5a5" font-size="8">approve · reject · changes</text>

  <rect x="524" y="148" width="105" height="42" rx="5" fill="url(#tg)"/>
  <text x="576" y="166" text-anchor="middle" fill="#fef2f2" font-size="9" font-weight="600">simulate</text>
  <text x="576" y="181" text-anchor="middle" fill="#fca5a5" font-size="8">test policy packs</text>

  <rect x="637" y="148" width="110" height="42" rx="5" fill="url(#tg)"/>
  <text x="692" y="166" text-anchor="middle" fill="#fef2f2" font-size="9" font-weight="600">export_audit</text>
  <text x="692" y="181" text-anchor="middle" fill="#fca5a5" font-size="8">compliance packs</text>

