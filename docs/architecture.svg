  <text x="130" y="325" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">ALLOW</text>
  <text x="300" y="325" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">REVIEW</text>
  <text x="470" y="325" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">BLOCK</text>
  <text x="640" y="325" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">PAUSE</text>
  <text x="130" y="337" text-anchor="middle" fill="#94a3b8" font-size="7">proceed</text>
  <text x="300" y="337" text-anchor="middle" fill="#94a3b8" font-size="7">needs approval</text>
  <text x="470" y="337" text-anchor="middle" fill="#94a3b8" font-size="7">denied</text>
  <text x="640" y="337" text-anchor="middle" fill="#94a3b8" font-size="7">needs verification</text>

  <!-- Badges -->
  <rect x="40" y="375" width="85" height="22" rx="4" fill="#dc2626"/>
  <text x="82" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">rmcp 1.7</text>

  <rect x="133" y="375" width="75" height="22" rx="4" fill="#b91c1c"/>
  <text x="170" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">8 Tools</text>

  <rect x="216" y="375" width="100" height="22" rx="4" fill="#7c3aed"/>
  <text x="266" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">8 Risk Domains</text>

  <rect x="324" y="375" width="110" height="22" rx="4" fill="#0891b2"/>
  <text x="379" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">Approval Queue</text>

  <rect x="442" y="375" width="110" height="22" rx="4" fill="#059669"/>
  <text x="497" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">Policy Simulation</text>

  <rect x="560" y="375" width="95" height="22" rx="4" fill="#d97706"/>
  <text x="607" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">Audit Export</text>

  <rect x="663" y="375" width="97" height="22" rx="4" fill="#be185d"/>
  <text x="711" y="390" text-anchor="middle" fill="white" font-size="9" font-weight="600">Enterprise</text>

  <!-- Non-bypassable note -->
  <rect x="40" y="410" width="720" height="35" rx="6" fill="#1a0505" stroke="#7f1d1d" stroke-width="1"/>
  <text x="400" y="432" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">⚠️  This server is the gatekeeper — should not be bypassable by downstream MCPs</text>

  <text x="400" y="470" text-anchor="middle" fill="#475569" font-size="10">enterprise.adk-rust.com · Zavora AI · Apache-2.0</text>
