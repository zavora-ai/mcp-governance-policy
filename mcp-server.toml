server_id = "mcp_governance_policy"
display_name = "Governance Policy"
version = "1.1.0"
domain = "governance"
sdk_version = "0.1.0"
risk_level = "high"
writes_allowed = "gated"
transports = ["stdio"]
credentials = []
governance_gates = []
environments = ["development", "staging", "production"]

[[tools]]
name = "evaluate_policy"
description = "Evaluate policy — decide allow, block, review, or pause"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "open_approval"
description = "Open a HITL approval task"
risk_class = "internal_write"
requires_approval = false
credential_bindings = []

[[tools]]
name = "list_approvals"
description = "Show pending approvals by owner/risk/domain"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "resolve_approval"
description = "Approve, reject, or request changes"
risk_class = "internal_write"
requires_approval = true
credential_bindings = []

[[tools]]
name = "simulate_policy"
description = "Test policy changes against fixtures or history"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "audit_log"
description = "Read recent allow/block/review outcomes"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "request_exception"
description = "Request time-bound policy exception"
risk_class = "internal_write"
requires_approval = true
credential_bindings = []

[[tools]]
name = "export_evidence"
description = "Export governance evidence for compliance"
risk_class = "read_only"
requires_approval = false
credential_bindings = []
